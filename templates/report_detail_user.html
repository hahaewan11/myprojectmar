{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Detail | My Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        /* keep minimal styles consistent with admin view */
        :root{--bg:#f2f7ff;--surface:#fff;--primary:#1d4ed8;--text:#0f172a;--muted:#475569}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Arial}
        body{background:var(--bg);color:var(--text)}
        .container{max-width:1080px;margin:0 auto;padding:22px}
        .topnav{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--primary),#2563eb);color:#fff;padding:18px;border-radius:20px;margin-bottom:22px}
        .topnav .brand{display:flex;align-items:center;gap:12px;font-weight:700}
        .panel{background:var(--surface);border-radius:20px;padding:24px;box-shadow:0 20px 40px rgba(15,23,42,0.07)}
        .details-grid{display:grid;gap:20px;grid-template-columns:1fr 320px}
        .section strong{display:block;margin-bottom:6px}
        @media (max-width:900px){.details-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div class="container">
    <div class="topnav">
        <div class="brand"><i class="fa-solid fa-file-eye"></i> Report Detail</div>
        <div class="actions">
            <a href="{% url 'dashboard' %}"><button class="btn btn-light"><i class="fa-solid fa-arrow-left"></i> Back</button></a>
        </div>
    </div>

    <div class="panel details-grid">
        <div>
            {% include 'includes/report_detail_core.html' %}
            <!-- users cannot change status or send admin responses here -->
        </div>

        {% include 'includes/report_detail_gallery.html' %}
    </div>
</div>

</body>
</html>
